<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S.</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#020810;
  color:#e0f0ff;
  font-family:'Rajdhani',sans-serif;
  overflow:hidden;height:100vh;width:100vw;
  user-select:none;
}
#particles-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#bg-gradient{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;
  background:
    radial-gradient(ellipse at 50% 30%, rgba(0,80,120,0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(0,40,60,0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 80%, rgba(0,30,50,0.08) 0%, transparent 50%);
}
#app{position:relative;z-index:1;width:100%;height:100vh;display:flex;flex-direction:column}
#top-bar{
  padding:20px 30px;display:flex;justify-content:space-between;align-items:flex-start;
  background:linear-gradient(180deg,rgba(0,20,40,0.8) 0%,transparent 100%);
}
#status-group{display:flex;flex-direction:column;gap:4px}
#status-label{font-size:11px;color:#005577;letter-spacing:3px;font-weight:700}
#status{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:2px;transition:color 0.3s}
#status.indicator-offline{color:#555}
#status.indicator-listening{color:#00ff66}
#status.indicator-thinking{color:#ffaa00}
#status.indicator-speaking{color:#00ddff}
#clock-box{text-align:right}
#time{
  font-family:'Orbitron',monospace;font-size:28px;font-weight:700;
  background:linear-gradient(135deg,#00ccff,#00ff88);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:2px;
}
#date{font-size:12px;color:#004466;margin-top:2px;letter-spacing:1px}
#center{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;
}
#title-row{display:flex;align-items:center;gap:20px;margin-bottom:10px}
#title{font-family:'Orbitron',monospace;font-size:42px;font-weight:900;letter-spacing:6px}
#title-j{color:#00ccff;text-shadow:0 0 20px rgba(0,204,255,0.3)}
#title-dots{color:#005577;text-shadow:0 0 10px rgba(0,85,119,0.2)}
#title-text{color:#e0f0ff}
#subtitle{font-size:11px;color:#003355;letter-spacing:4px;margin-bottom:20px}
#reactor-container{position:relative;width:200px;height:200px;margin:10px 0}
#reactor-canvas{width:100%;height:100%}
#reactor-glow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,150,255,0.06) 0%,transparent 60%);
  animation:pulseGlow 3s ease-in-out infinite;pointer-events:none;
}
@keyframes pulseGlow{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.5}
  50%{transform:translate(-50%,-50%) scale(1.15);opacity:1}
}
#bubble{
  font-size:16px;color:#c0e8ff;min-height:50px;max-width:520px;
  text-align:center;display:flex;align-items:center;justify-content:center;
  padding:14px 24px;margin:12px 0;
  background:linear-gradient(135deg,rgba(0,20,45,0.9),rgba(0,10,25,0.9));
  border:1px solid rgba(0,80,140,0.3);border-radius:12px;
  backdrop-filter:blur(10px);position:relative;transition:all 0.3s;
  box-shadow:0 4px 30px rgba(0,0,0,0.3),inset 0 1px 0 rgba(0,150,255,0.1);
}
#bubble::before{
  content:'';position:absolute;top:-1px;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,150,255,0.3),transparent);
}
#bubble.speaking{border-color:rgba(0,200,255,0.5);box-shadow:0 4px 40px rgba(0,100,200,0.15),inset 0 1px 0 rgba(0,200,255,0.15)}
#bubble.thinking{border-color:rgba(255,170,0,0.3)}
#bubble.listening{border-color:rgba(0,255,100,0.2)}
#wave-container{width:70%;height:70px;margin:5px 0;position:relative}
#wave-canvas{width:100%;height:100%;border-radius:8px}
#bottom-section{width:100%;padding:10px 30px 20px;display:flex;flex-direction:column;align-items:center}
#log-box{
  width:80%;max-height:120px;background:rgba(0,10,20,0.85);border:1px solid rgba(0,40,70,0.3);
  border-radius:8px;padding:10px 14px;overflow-y:auto;font-size:12px;line-height:1.7;
  color:#60a0b0;backdrop-filter:blur(8px);
  box-shadow:inset 0 2px 20px rgba(0,0,0,0.4);
}
#log-box::-webkit-scrollbar{width:3px}
#log-box::-webkit-scrollbar-track{background:transparent}
#log-box::-webkit-scrollbar-thumb{background:#003355;border-radius:2px}
#controls{display:flex;align-items:center;gap:12px;margin-top:12px}
#mic-btn{
  background:linear-gradient(135deg,rgba(0,40,80,0.8),rgba(0,20,50,0.8));
  color:#00ccff;border:1px solid rgba(0,80,140,0.4);padding:12px 36px;
  border-radius:25px;cursor:pointer;font-family:'Orbitron',monospace;
  font-size:12px;font-weight:700;letter-spacing:3px;
  transition:all 0.3s;backdrop-filter:blur(5px);
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
}
#mic-btn:hover{border-color:rgba(0,150,255,0.6);box-shadow:0 4px 25px rgba(0,100,200,0.2);transform:translateY(-1px)}
#mic-btn:active{transform:translateY(0)}
#mic-btn.listening{
  background:linear-gradient(135deg,rgba(0,60,30,0.8),rgba(0,30,20,0.8));
  border-color:rgba(0,255,100,0.5);color:#00ff66;
  box-shadow:0 4px 25px rgba(0,255,100,0.1);
}
#mic-btn.thinking{
  background:linear-gradient(135deg,rgba(60,40,0,0.8),rgba(30,20,0,0.8));
  border-color:rgba(255,170,0,0.5);color:#ffaa00;
  box-shadow:0 4px 25px rgba(255,170,0,0.1);
}
#mic-btn.speaking{
  background:linear-gradient(135deg,rgba(0,30,60,0.8),rgba(0,20,40,0.8));
  border-color:rgba(0,200,255,0.5);color:#00ddff;
  box-shadow:0 4px 25px rgba(0,200,255,0.15);
}
.download-link{
  font-size:11px;color:#004466;text-decoration:none;transition:color 0.3s;
  padding:6px 14px;border:1px solid rgba(0,50,80,0.3);border-radius:15px;
  background:rgba(0,10,20,0.5);
}
.download-link:hover{color:#0088aa;border-color:rgba(0,100,150,0.4)}
.git-link{color:#003355;font-size:11px;text-decoration:none;transition:color 0.3s}
.git-link:hover{color:#006688}
#bottom-links{display:flex;gap:16px;margin-top:10px;align-items:center}
#download-section{position:fixed;bottom:20px;right:25px;z-index:10}
</style>
</head>
<body>
<div id="bg-gradient"></div>
<canvas id="particles-canvas"></canvas>
<div id="app">
  <div id="top-bar">
    <div id="status-group">
      <div id="status-label">SISTEMA</div>
      <div id="status" class="indicator-offline">INICIANDO...</div>
    </div>
    <div id="clock-box">
      <div id="time">00:00:00</div>
      <div id="date">---</div>
    </div>
  </div>
  <div id="center">
    <div id="title-row">
      <span id="title-j">J</span><span id="title-dots">.</span><span id="title-j">A</span><span id="title-dots">.</span><span id="title-j">R</span><span id="title-dots">.</span><span id="title-j">V</span><span id="title-dots">.</span><span id="title-j">I</span><span id="title-dots">.</span><span id="title-text">S</span>
    </div>
    <div id="subtitle">ASISTENTE CON INTELIGENCIA ARTIFICIAL</div>
    <div id="reactor-container">
      <div id="reactor-glow"></div>
      <canvas id="reactor-canvas" width="200" height="200"></canvas>
    </div>
    <div id="bubble">Presiona INICIAR y habla conmigo</div>
    <div id="wave-container"><canvas id="wave-canvas"></canvas></div>
  </div>
  <div id="bottom-section">
    <div id="log-box"></div>
    <div id="controls">
      <button id="mic-btn">INICIAR</button>
      <a class="download-link" href="https://github.com/cristoforohuamalixd-droid/jarvis-assistant/releases/download/v1.0/Jarvis.exe" target="_blank">DESCARGAR .EXE</a>
    </div>
    <div id="bottom-links">
      <a class="git-link" href="https://github.com/cristoforohuamalixd-droid/jarvis-assistant" target="_blank">GitHub</a>
      <span style="color:#002233">|</span>
      <span style="color:#002244;font-size:10px">v1.0 &middot; Groq AI</span>
    </div>
  </div>
</div>
<script>
const GROQ_KEY = ["gsk_", "rAi2qAusIq4Xe3sBjU26WGdyb3FYApr8z3SpbG3OsdJmwvvn9yKy"].join("");
const GROQ_MODEL = "llama-3.3-70b-versatile";
const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";

let listening = false, speaking = false, thinking = false, waveAmp = 0, recognition = null;
const synth = window.speechSynthesis;
let voice = null;

const statusEl = document.getElementById("status");
const timeEl = document.getElementById("time");
const dateEl = document.getElementById("date");
const bubbleEl = document.getElementById("bubble");
const logEl = document.getElementById("log-box");
const waveCanvas = document.getElementById("wave-canvas");
const reactorCanvas = document.getElementById("reactor-canvas");
const particlesCanvas = document.getElementById("particles-canvas");
const micBtn = document.getElementById("mic-btn");

// ===== CLOCK =====
function tickClock(){
  const n=new Date();
  timeEl.textContent=n.toLocaleTimeString("es-ES",{hour12:false});
  dateEl.textContent=n.toLocaleDateString("es-ES",{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
setInterval(tickClock,1000);tickClock();

// ===== PARTICLES =====
function initParticles(){
  const c=particlesCanvas,ctx=c.getContext("2d");
  c.width=window.innerWidth;c.height=window.innerHeight;
  const particles=[];
  for(let i=0;i<60;i++){
    particles.push({
      x:Math.random()*c.width,y:Math.random()*c.height,
      vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,
      r:Math.random()*1.5+0.5,a:Math.random()*0.4+0.1
    });
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(const p of particles){
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;
      if(p.y<0)p.y=c.height;if(p.y>c.height)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,150,255,${p.a})`;ctx.fill();
    }
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){
          ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);
          ctx.lineTo(particles[j].x,particles[j].y);
          ctx.strokeStyle=`rgba(0,100,200,${0.08*(1-d/120)})`;ctx.lineWidth=0.5;ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
}
window.addEventListener("resize",()=>{
  particlesCanvas.width=window.innerWidth;
  particlesCanvas.height=window.innerHeight;
});
initParticles();

// ===== REACTOR =====
function drawReactor(){
  const c=reactorCanvas,ctx=c.getContext("2d");
  const cx=100,cy=100,ts=Date.now()/1000;
  ctx.clearRect(0,0,200,200);
  for(let i=0;i<6;i++){
    const r=45+i*13;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,${60+i*20},${120+i*20},${0.2+i*0.08})`;
    ctx.lineWidth=1;ctx.stroke();
  }
  const pulse=Math.sin(ts*2)*0.15+0.85;
  ctx.beginPath();ctx.arc(cx,cy,38,0,Math.PI*2);
  ctx.strokeStyle=`rgba(0,180,255,${0.4*pulse})`;ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,16,0,Math.PI*2);
  const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,16);
  grad.addColorStop(0,`rgba(0,200,255,${0.4*pulse})`);
  grad.addColorStop(0.5,`rgba(0,80,160,${0.3*pulse})`);
  grad.addColorStop(1,`rgba(0,20,60,0)`);
  ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,16,0,Math.PI*2);
  ctx.strokeStyle=`rgba(0,200,255,${0.6*pulse})`;ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,6,0,Math.PI*2);
  ctx.fillStyle=`rgba(100,230,255,${0.5*pulse})`;ctx.fill();
  ctx.strokeStyle=`rgba(150,240,255,${0.4})`;ctx.lineWidth=1;ctx.stroke();
  for(let i=0;i<3;i++){
    const angle=ts*1.5+i*2.1;
    ctx.beginPath();ctx.arc(cx+Math.cos(angle)*30,cy+Math.sin(angle)*30,4-i,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,150,255,${0.15-i*0.03})`;ctx.fill();
  }
  requestAnimationFrame(drawReactor);
}
drawReactor();

// ===== WAVE =====
function drawWave(){
  const c=waveCanvas,ctx=c.getContext("2d");
  c.width=c.clientWidth||600;c.height=c.clientHeight||70;
  const w=c.width,h=c.height,cy=h/2,n=70,ts=Date.now()/1000;
  ctx.clearRect(0,0,w,h);
  ctx.beginPath();ctx.rect(0,0,w,h);
  const bg=ctx.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,'rgba(0,15,35,0.5)');bg.addColorStop(1,'rgba(0,5,15,0.5)');
  ctx.fillStyle=bg;ctx.fill();
  for(let layer=0;layer<4;layer++){
    ctx.beginPath();
    const amp=waveAmp*(0.8-layer*0.2);
    for(let i=0;i<=n;i++){
      const x=(i/n)*w;
      const y=cy+amp*Math.sin(i*0.18+ts*4+layer*0.8);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    const intensity=Math.min(waveAmp/60,1);
    const g=Math.round(80+160*intensity);
    const b=Math.round(120+180*intensity);
    if(speaking){
      ctx.strokeStyle=`rgba(0,${g},${b},${0.5+intensity*0.3})`;
      ctx.shadowColor=`rgba(0,${b},255,${intensity*0.3})`;
      ctx.shadowBlur=8+intensity*10;
    }else if(waveAmp>0){
      ctx.strokeStyle=`rgba(0,80,120,${0.3+intensity*0.2})`;
      ctx.shadowBlur=0;
    }else{
      ctx.strokeStyle='rgba(0,30,50,0.15)';ctx.shadowBlur=0;
    }
    ctx.lineWidth=2-layer*0.4;ctx.stroke();ctx.shadowBlur=0;
  }
  requestAnimationFrame(drawWave);
}
drawWave();

// ===== VOICE =====
function loadVoice(){
  voice=synth.getVoices().find(v=>v.lang.startsWith("es")&&v.name.includes("Male"))
    ||synth.getVoices().find(v=>v.lang.startsWith("es"))
    ||synth.getVoices()[0];
}
synth.onvoiceschanged=loadVoice;
loadVoice();
setTimeout(loadVoice,500);

function setStatus(text,cls){
  statusEl.textContent=text;
  statusEl.className='indicator-'+cls;
}

function log(msg){
  const d=document.createElement("div");d.textContent=msg;logEl.appendChild(d);
  logEl.scrollTop=logEl.scrollHeight;
}

function speak(text){
  if(speaking||thinking)return;
  speaking=true;bubbleEl.textContent=text;bubbleEl.className="speaking";
  log("JARVIS: "+text);setStatus("HABLANDO","speaking");
  micBtn.textContent="HABLANDO";micBtn.className="speaking";
  synth.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="es-ES";u.rate=1.0;u.pitch=0.9;
  if(voice)u.voice=voice;
  u.onend=()=>{
    speaking=false;bubbleEl.textContent="";bubbleEl.className="";
    if(listening){
      setStatus("ESCUCHANDO","listening");
      micBtn.textContent="ESCUCHANDO";micBtn.className="listening";
    }else{
      setStatus("DETENIDO","offline");
      micBtn.textContent="INICIAR";micBtn.className="";
    }
  };
  u.onerror=()=>{speaking=false;};
  synth.speak(u);
}

// ===== GROQ =====
async function askGroq(text){
  thinking=true;setStatus("PENSANDO","thinking");
  bubbleEl.textContent="Procesando...";bubbleEl.className="thinking";
  micBtn.textContent="PENSANDO";micBtn.className="thinking";
  try{
    const r=await fetch(GROQ_URL,{
      method:"POST",
      headers:{"Authorization":"Bearer "+GROQ_KEY,"Content-Type":"application/json"},
      body:JSON.stringify({
        model:GROQ_MODEL,
        messages:[
          {role:"system",content:"Eres J.A.R.V.I.S., el asistente de IA de Tony Stark. Responde de forma breve, clara y util en espanol. Maximo 3 oraciones."},
          {role:"user",content:text}
        ],
        max_tokens:150
      })
    });
    if(!r.ok)throw new Error(await r.text());
    const d=await r.json(),reply=d.choices[0].message.content.trim();
    thinking=false;speak(reply);
  }catch(e){
    thinking=false;log("ERROR: "+e.message);
    speak("Error de conexion con la IA. Intenta de nuevo.");
  }
}

// ===== COMMANDS =====
function handleCommand(t){
  const l=t.toLowerCase(),n=new Date();
  if(["adios","chao","me voy","hasta luego","salir","apaga","termina","cerrar"].some(p=>l.includes(p))){
    speak("Hasta pronto.");listening=false;
    micBtn.textContent="INICIAR";micBtn.className="";setStatus("DETENIDO","offline");
    if(recognition)try{recognition.stop()}catch(e){}
    return true;
  }
  if(["hora","que hora es","hora es"].some(p=>l.includes(p))){
    speak(`Son las ${n.getHours()} con ${n.getMinutes()} minutos.`);return true;
  }
  if(["fecha","que dia es","dia es","que fecha es"].some(p=>l.includes(p))){
    const d=["domingo","lunes","martes","miercoles","jueves","viernes","sabado"];
    const m=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
    speak(`Hoy es ${d[n.getDay()]} ${n.getDate()} de ${m[n.getMonth()]}.`);return true;
  }
  if(["busca","googlea","navega"].some(p=>l.includes(p))){
    let q=l.replace(/busca|googlea|navega|en internet/g,"").trim();
    if(q){window.open("https://www.google.com/search?q="+encodeURIComponent(q),"_blank");speak(`Buscando ${q}.`);}
    else speak("Que desea buscar?");
    return true;
  }
  return false;
}

// ===== RECOGNITION =====
function startListening(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert("Usa Chrome o Edge para el reconocimiento de voz.");return;}
  if(recognition)try{recognition.stop()}catch(e){}
  recognition=new SR();recognition.lang="es-ES";recognition.continuous=true;recognition.interimResults=false;
  recognition.onresult=e=>{
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(!e.results[i].isFinal)continue;
      const t=e.results[i][0].transcript;
      log("Tu: "+t);
      if(speaking||thinking)return;
      if(!handleCommand(t))askGroq(t);
    }
  };
  recognition.onerror=e=>{
    if(e.error==="no-speech")return;
    log("Error: "+e.error);
    if(listening)setTimeout(()=>{if(listening)startListening()},500);
  };
  recognition.onend=()=>{if(listening)setTimeout(()=>{if(listening)startListening()},300)};
  try{
    recognition.start();listening=true;
    setStatus("ESCUCHANDO","listening");
    micBtn.textContent="ESCUCHANDO";micBtn.className="listening";
    bubbleEl.textContent="Te escucho...";bubbleEl.className="listening";
    log("JARVIS: Sistema listo. Puedes hablar.");
  }catch(e){log("Error al iniciar: "+e.message);}
}

function stopListening(){
  listening=false;
  if(recognition)try{recognition.stop()}catch(e){}
  micBtn.textContent="INICIAR";micBtn.className="";setStatus("DETENIDO","offline");
  bubbleEl.textContent="Presiona INICIAR y habla conmigo";bubbleEl.className="";
}

micBtn.addEventListener("click",()=>{listening?stopListening():startListening()});

document.addEventListener("keydown",e=>{if(e.key==="Escape"&&listening)stopListening()});

// ===== WAVE AMP =====
function animateAmp(){
  waveAmp=speaking?Math.min(waveAmp+3,60):Math.max(waveAmp-5,0);
  setTimeout(animateAmp,30);
}
animateAmp();

log("J.A.R.V.I.S. v1.0 listo.");
</script>
</body>
</html>
